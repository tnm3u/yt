name: YouTube Live M3U8 Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'
  push:
    paths:
      - 'streams.txt'
      - 'generate.py'
      - '.github/workflows/main.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python with cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yt-dlp requests

      - name: Create cookies file (optional)
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
          fi

      - name: Create directories
        run: |
          mkdir -p logos channels
          touch logos/.gitkeep channels/.gitkeep

      - name: Run playlist generator
        run: |
          python3 generate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add streams*.m3u8 epg.xml stats.json logos/ channels/ || true

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.txt
