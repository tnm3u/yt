      - name: Generate M3U8 playlist
        run: |
          echo "🎬 Generating playlist with configured URLs..."
          
          # Create playlist header
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "# Note: Streams added without verification" >> streams.m3u8
          echo "" >> streams.m3u8
          
          TOTAL=0
          
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue
            
            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue
            
            TOTAL=$((TOTAL + 1))
            
            # Extract a name from the URL for the EXTINF line
            NAME=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel $TOTAL")
            
            # Add to playlist immediately, no checking
            echo "" >> streams.m3u8
            echo "#EXTINF:-1,$NAME (Live Stream)" >> streams.m3u8
            echo "$URL" >> streams.m3u8
            
            echo "  Added: $NAME"
            
          done < streams.txt
          
          echo "" >> streams.m3u8
          echo "# Total streams: $TOTAL" >> streams.m3u8
          echo "# Last updated: $(date -u)" >> streams.m3u8
          
          echo ""
          echo "✅ Playlist generated with $TOTAL streams"
