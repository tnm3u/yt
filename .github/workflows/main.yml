name: YouTube Live M3U8 Generator
run-name: Generate playlist with Cloudflare Proxy 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          # Simplified WARP setup
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate playlist
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          from datetime import datetime, timezone

          PROXY_BASE = "https://siteproxy.chidex4k43342.workers.dev/yourtube/"

          def get_video_id(url, cookies_file):
              try:
                  ydl_opts = {'cookies': cookies_file, 'quiet': True}
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      return info.get('id')
              except:
                  return None

          # Read streams
          with open('streams.txt') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          m3u8 = ["#EXTM3U", f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}", f"# Total channels: {len(lines)}", ""]

          active = 0
          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line}")
              time.sleep(random.randint(5, 10))
              
              video_id = get_video_id(line, 'cookies.txt')
              
              if video_id:
                  active += 1
                  proxied_url = PROXY_BASE + f"https://www.youtube.com/watch?v={video_id}"
                  m3u8.append(f'#EXTINF:-1 tvg-name="Channel{i}" group-title="YouTube Live",Channel{i} (Live)')
                  m3u8.append(proxied_url)
                  m3u8.append("")
              else:
                  m3u8.append(f'#EXTINF:-1 tvg-name="Channel{i}" group-title="YouTube Live",Channel{i} (YouTube)')
                  m3u8.append(line)
                  m3u8.append("")

          m3u8.extend(["", f"# Summary: {active}/{len(lines)} streams active", f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n📊 FINAL: {active}/{len(lines)} active")
          PYTHON_EOF

          python generate.py

      - name: Fix git conflicts (ALWAYS RUNS)
        run: |
          echo "🔧 Fixing git conflict markers..."
          # Remove ALL conflict markers regardless of content
          sed -i '/^<<<<<<< /d' streams.m3u8
          sed -i '/^=======/d' streams.m3u8
          sed -i '/^>>>>>>> /d' streams.m3u8
          # Remove any duplicate lines
          awk '!seen[$0]++' streams.m3u8 > streams_clean.m3u8
          mv streams_clean.m3u8 streams.m3u8
          echo "✅ Conflicts fixed"

      - name: Show fixed playlist
        run: |
          echo ""
          echo "📄 Fixed streams.m3u8:"
          echo "======================"
          cat streams.m3u8

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add and commit
          git add -f streams.m3u8
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)]" || true
          
          # Force push (overwrites remote)
          git push --force origin main
          echo "✅ Playlist updated"
