name: YouTube Live M3U8 Generator
run-name: Generating live M3U8 playlist with cookies 🎬

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Create cookies file from secret
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies file created successfully"
            # Show first line to confirm (but not full content)
            echo "First line: $(head -1 cookies.txt)"
          else
            echo "⚠️ No cookies secret found - will use unauthenticated mode"
          fi

      - name: Generate M3U8 playlist with cookies
        run: |
          echo "🎬 Generating playlist with cookies..."
          
          # Create playlist header
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "# Using authenticated YouTube access" >> streams.m3u8
          echo "" >> streams.m3u8
          
          TOTAL=0
          ACTIVE=0
          
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue
            
            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue
            
            TOTAL=$((TOTAL + 1))
            echo ""
            echo "📺 [$TOTAL] Processing: $URL"
            
            # Extract channel name
            NAME=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel $TOTAL")
            
            STREAM_URL=""
            
            # Try with cookies first if they exist
            if [ -f "cookies.txt" ]; then
              echo "  🔑 Using cookie authentication..."
              
              # Try best quality (format 301 for 1080p)
              STREAM_URL=$(yt-dlp --cookies cookies.txt --socket-timeout 15 -f 301 -g "$URL" 2>/dev/null | head -1)
              
              # If 301 fails, try 300 (720p)
              if [ -z "$STREAM_URL" ]; then
                STREAM_URL=$(yt-dlp --cookies cookies.txt --socket-timeout 15 -f 300 -g "$URL" 2>/dev/null | head -1)
              fi
              
              # If still no URL, try best available
              if [ -z "$STREAM_URL" ]; then
                STREAM_URL=$(yt-dlp --cookies cookies.txt --socket-timeout 15 -f best -g "$URL" 2>/dev/null | head -1)
              fi
            fi
            
            # Fallback to no cookies or just the URL
            if [ -n "$STREAM_URL" ]; then
              echo "  ✅ Got direct stream URL!"
              ACTIVE=$((ACTIVE + 1))
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (Live - Direct)" >> streams.m3u8
              echo "$STREAM_URL" >> streams.m3u8
            else
              echo "  ⚠️ Using channel URL as fallback"
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (Live - via YouTube)" >> streams.m3u8
              echo "$URL" >> streams.m3u8
            fi
            
            # Small delay to be respectful
            sleep 1
            
          done < streams.txt
          
          # Add summary
          echo "" >> streams.m3u8
          echo "# Summary: $ACTIVE/$TOTAL direct streams" >> streams.m3u8
          echo "# Updated: $(date -u)" >> streams.m3u8
          
          # Clean up cookies file
          rm -f cookies.txt
          
          echo ""
          echo "📊 Summary: $ACTIVE/$TOTAL streams have direct URLs"

      - name: Show generated playlist
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -20 streams.m3u8
          echo "..."

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)]"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Playlist updated and pushed"
