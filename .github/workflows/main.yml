name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist with Smart Quality Selection 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Install Deno (JavaScript Runtime)
        run: |
          echo "📦 Installing Deno..."
          curl -fsSL https://deno.land/install.sh | sh
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.deno/bin:$PATH"
          echo "✅ Deno version: $(deno --version | head -1)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          
          echo "✅ WARP setup complete"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate HD playlist with smart quality selection
        id: generate
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import sys
          from datetime import datetime, timezone

          # Your Cloudflare Worker proxy - using the working domain from your deployment
          PROXY_BASE = "https://siteproxy.chidex4k43342.workers.dev/yourtube/"

          def get_stream_url(url, cookies_file):
              """Get the stream URL by prioritizing highest vertical resolution."""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 20,
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          return None, None
                      
                      video_id = info.get('id')
                      title = info.get('title', 'Unknown')
                      
                      # --- Quality Check ---
                      is_live = info.get('is_live', False)
                      live_status = info.get('live_status', '')
                      if not (is_live or live_status == 'is_live'):
                          print(f"  ⚠️ Not currently live")
                          return None, video_id
                      # ---------------------

                      formats = info.get('formats', [])
                      
                      # --- Find the best video format by height ---
                      best_format = None
                      target_heights = [1080, 720, 480]
                      
                      video_formats = [f for f in formats if f.get('height') and f.get('url')]
                      video_formats.sort(key=lambda f: f.get('height', 0), reverse=True)

                      if not video_formats:
                          print("  ⚠️ No suitable video formats found.")
                          return None, video_id

                      for target in target_heights:
                          for fmt in video_formats:
                              fmt_height = fmt.get('height', 0)
                              if fmt_height == target:
                                  best_format = fmt
                                  break
                          if best_format:
                              break
                      
                      if not best_format and video_formats:
                          best_format = video_formats[0]

                      if best_format:
                          height = best_format.get('height', 'N/A')
                          codec = best_format.get('vcodec', 'N/A')
                          fps = best_format.get('fps', '')
                          format_note = best_format.get('format_note', '')
                          
                          quality_tag = f"{height}p"
                          if fps and fps > 30:
                              quality_tag += f"{fps}"
                              
                          print(f"  ✅ Selected: {quality_tag} ({codec}, {format_note})")
                          return best_format['url'], video_id
                      else:
                          print(f"  ⚠️ Could not select a format.")
                          return None, video_id
                          
              except Exception as e:
                  print(f"  ⚠️ Error: {str(e)[:100]}")
                  return None, None

          # Read streams.txt
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(0)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          m3u8 = [
              "#EXTM3U",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              f"# Proxy: {PROXY_BASE}",
              ""
          ]

          active = 0
          quality_stats = {"1080p": 0, "720p": 0, "480p": 0, "other": 0}
          active_channels = []
          offline_channels = []

          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line}")
              
              time.sleep(random.randint(5, 10))
              stream_url, video_id = get_stream_url(line, 'cookies.txt')
              
              name_match = re.search(r'@([^/]+)', line)
              channel_name = name_match.group(1) if name_match else f"Channel{i}"
              
              if stream_url:
                  active += 1
                  active_channels.append(channel_name)
                  
                  # Determine quality
                  if '1080' in stream_url:
                      quality_stats["1080p"] += 1
                      quality_tag = "1080p"
                  elif '720' in stream_url:
                      quality_stats["720p"] += 1
                      quality_tag = "720p"
                  elif '480' in stream_url:
                      quality_stats["480p"] += 1
                      quality_tag = "480p"
                  else:
                      quality_stats["other"] += 1
                      quality_tag = "HD"
                  
                  print(f"  ✅ SUCCESS: {quality_tag} stream")
                  
                  # Use proxy with just the video ID (more reliable)
                  proxied_url = PROXY_BASE + video_id
                  
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} (Live - {quality_tag})')
                  m3u8.append(proxied_url)
                  m3u8.append("")
              elif video_id:
                  print(f"  ⚠️ Using proxied YouTube page")
                  offline_channels.append(channel_name)
                  proxied_url = PROXY_BASE + video_id
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} (Proxy)')
                  m3u8.append(proxied_url)
                  m3u8.append("")
              else:
                  print(f"  ❌ Failed - using original URL")
                  offline_channels.append(channel_name)
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} (YouTube)')
                  m3u8.append(line)
                  m3u8.append("")

          m3u8.extend([
              "",
              f"# Summary: {active}/{len(lines)} streams active",
              f"# Quality: 1080p:{quality_stats['1080p']} 720p:{quality_stats['720p']} 480p:{quality_stats['480p']}",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          # Save stats for outputs
          with open('stats.txt', 'w') as f:
              f.write(f"active={active}\n")
              f.write(f"total={len(lines)}\n")
              f.write(f"quality_1080p={quality_stats['1080p']}\n")
              f.write(f"quality_720p={quality_stats['720p']}\n")
              f.write(f"quality_480p={quality_stats['480p']}\n")
              f.write(f"active_channels={','.join(active_channels)}\n")
              f.write(f"offline_channels={','.join(offline_channels)}\n")

          print(f"\n{'='*50}")
          print(f"📊 FINAL: {active}/{len(lines)} streams active")
          print(f"📊 Quality: 1080p:{quality_stats['1080p']} 720p:{quality_stats['720p']} 480p:{quality_stats['480p']}")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Load stats
        id: stats
        run: |
          source stats.txt
          echo "active=$active" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "quality_1080p=$quality_1080p" >> $GITHUB_OUTPUT
          echo "quality_720p=$quality_720p" >> $GITHUB_OUTPUT
          echo "quality_480p=$quality_480p" >> $GITHUB_OUTPUT
          echo "active_channels=$active_channels" >> $GITHUB_OUTPUT
          echo "offline_channels=$offline_channels" >> $GITHUB_OUTPUT

      - name: Fix git conflicts
        run: |
          sed -i '/^<<<<<<< /d' streams.m3u8 2>/dev/null || true
          sed -i '/^=======/d' streams.m3u8 2>/dev/null || true
          sed -i '/^>>>>>>> /d' streams.m3u8 2>/dev/null || true
          awk '!seen[$0]++' streams.m3u8 > streams_clean.m3u8 2>/dev/null || true
          mv streams_clean.m3u8 streams.m3u8 2>/dev/null || true

      - name: Show playlist preview
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -20 streams.m3u8
          echo "..."

      - name: Send Telegram Notification
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            📺 *YouTube Playlist Updated*
            
            ✅ *Active Streams:* ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }}
            
            📡 *Quality Breakdown:*
            1080p: ${{ steps.stats.outputs.quality_1080p }}
            720p: ${{ steps.stats.outputs.quality_720p }}
            480p: ${{ steps.stats.outputs.quality_480p }}
            
            🔗 *Playlist URL:*
            https://raw.githubusercontent.com/uticap/Youtube-to-M3u8/main/streams.m3u8
            
            🕐 *Updated:* $(date -u '+%Y-%m-%d %H:%M UTC')
        continue-on-error: true

      - name: Commit and push with PAT and retry
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🔄 Update HD playlist [$(date -u +%H:%M)]"
          
          # Retry logic with exponential backoff
          MAX_RETRIES=5
          DELAY=10
          SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📤 Push attempt $i/$MAX_RETRIES..."
            
            if git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git HEAD:main; then
              echo "✅ Successfully pushed on attempt $i"
              SUCCESS=true
              break
            else
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ Push failed, waiting ${DELAY}s before retry..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ All push attempts failed after $MAX_RETRIES retries"
            exit 1
          fi
