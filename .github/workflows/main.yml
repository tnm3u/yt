name: YouTube Live M3U8 Generator
run-name: Generate playlist 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create playlist
        run: |
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "" >> streams.m3u8
          
          while read line; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "$line" ]] && continue
            
            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue
            
            NAME=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel")
            echo "" >> streams.m3u8
            echo "#EXTINF:-1,$NAME" >> streams.m3u8
            echo "$URL" >> streams.m3u8
          done < streams.txt
          
          echo "" >> streams.m3u8
          echo "# Updated: $(date -u)" >> streams.m3u8

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.m3u8
          git diff --staged --quiet || git commit -m "Update playlist"
          git pull --rebase origin main || true
          git push
