name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "⚠️ No cookies found - continuing without authentication"
            touch cookies.txt
          else
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"
          fi

      - name: Generate playlist
        id: generate
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import sys
          from datetime import datetime, timezone, timedelta

          def get_video_info(url, cookies_file):
              """Get video ID and info."""
              ydl_opts = {
                  'cookies': cookies_file if os.path.exists(cookies_file) and os.path.getsize(cookies_file) > 0 else None,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 30,
                  'retries': 3,
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          return None
                      
                      video_id = info.get('id')
                      if not video_id:
                          return None
                      
                      # Check if live
                      is_live = info.get('is_live', False)
                      live_status = info.get('live_status', '')
                      
                      result = {
                          'video_id': video_id,
                          'title': info.get('title', 'Unknown'),
                          'channel': info.get('channel', 'Unknown'),
                          'is_live': is_live or live_status == 'is_live'
                      }
                      
                      # Get quality if live
                      if result['is_live']:
                          formats = info.get('formats', [])
                          video_formats = [f for f in formats if f.get('height')]
                          
                          if video_formats:
                              video_formats.sort(key=lambda f: f.get('height', 0), reverse=True)
                              height = video_formats[0].get('height', 0)
                              
                              if height >= 1080:
                                  result['quality'] = '1080p'
                              elif height >= 720:
                                  result['quality'] = '720p'
                              elif height >= 480:
                                  result['quality'] = '480p'
                              else:
                                  result['quality'] = f'{height}p'
                              
                              fps = video_formats[0].get('fps', '')
                              if fps and fps > 30:
                                  result['quality'] += f'{int(fps)}'
                          else:
                              result['quality'] = 'unknown'
                      else:
                          result['quality'] = 'offline'
                      
                      return result
                          
              except Exception as e:
                  print(f"  ⚠️ Error: {str(e)[:100]}")
                  return None

          # Read streams.txt
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              with open('streams.m3u8', 'w') as f:
                  f.write("#EXTM3U\n# ERROR: streams.txt not found\n")
              sys.exit(0)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              with open('streams.m3u8', 'w') as f:
                  f.write("#EXTM3U\n# No streams configured\n")
              sys.exit(0)

          # Create playlist
          m3u8 = [
              "#EXTM3U",
              "#EXT-X-VERSION:3",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              "# Use with Streamlink: streamlink --player=vlc THIS_URL best",
              ""
          ]

          active = 0
          active_channels = []
          offline_channels = []
          error_channels = []

          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line}")
              time.sleep(random.uniform(2, 5))
              
              # Extract channel name
              name_match = re.search(r'@([^/]+)', line)
              channel_name = name_match.group(1) if name_match else f"Channel{i}"
              channel_name = re.sub(r'[^\w\s-]', '', channel_name).strip()
              
              info = get_video_info(line, 'cookies.txt')
              
              if info and info.get('video_id'):
                  youtube_url = f"https://www.youtube.com/watch?v={info['video_id']}"
                  
                  if info.get('is_live'):
                      active += 1
                      active_channels.append(channel_name)
                      quality = info.get('quality', 'unknown')
                      print(f"  ✅ LIVE: {channel_name} [{quality}]")
                      m3u8.append(f'#EXTINF:-1 tvg-id="{info["video_id"]}" tvg-name="{channel_name}" group-title="News",{channel_name} [{quality}]')
                      m3u8.append(youtube_url)
                  else:
                      offline_channels.append(channel_name)
                      print(f"  ⚠️ OFFLINE: {channel_name}")
                      m3u8.append(f'#EXTINF:-1 tvg-id="{info["video_id"]}" tvg-name="{channel_name}" group-title="News",{channel_name} [Offline]')
                      m3u8.append(youtube_url)
                  m3u8.append("")
              else:
                  error_channels.append(channel_name)
                  print(f"  ❌ ERROR: {channel_name}")
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="News",{channel_name} [Error]')
                  m3u8.append(line)
                  m3u8.append("")

          # Add summary
          next_refresh = datetime.now(timezone.utc) + timedelta(hours=6)
          m3u8.extend([
              "",
              f"# Summary: {active}/{len(lines)} streams active",
              f"# Active: {', '.join(active_channels) if active_channels else 'None'}",
              f"# Offline: {len(offline_channels)}",
              f"# Errors: {len(error_channels)}",
              f"# Next refresh: {next_refresh.strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          # Write playlist
          with open('streams.m3u8', 'w', encoding='utf-8') as f:
              f.write('\n'.join(m3u8))

          # Save stats
          with open('stats.txt', 'w') as f:
              f.write(f"active={active}\n")
              f.write(f"total={len(lines)}\n")
              f.write(f"active_channels={','.join(active_channels)}\n")
              f.write(f"offline_channels={','.join(offline_channels)}\n")
              f.write(f"error_channels={','.join(error_channels)}\n")

          print(f"\n{'='*50}")
          print(f"📊 FINAL: {active}/{len(lines)} streams active")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Verify playlist
        run: |
          echo "🔍 Verifying playlist..."
          if [ ! -f "streams.m3u8" ]; then
            echo "❌ streams.m3u8 not created!"
            exit 1
          fi
          
          echo "✅ streams.m3u8 exists ($(wc -l < streams.m3u8) lines)"
          echo ""
          echo "📄 First 10 lines:"
          head -10 streams.m3u8

      - name: Prepare GitHub Pages
        run: |
          # Create .nojekyll
          touch .nojekyll
          
          # Create simple index.html
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Live News Streams</title>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                  body { font-family: Arial; padding: 20px; background: #f0f0f0; }
                  .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
                  h1 { color: #333; }
                  .btn { background: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; margin: 10px 0; border-radius: 5px; }
                  pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📺 Live News Streams</h1>
                  <p>Playlist URL (for VLC/Streamlink):</p>
                  <pre>https://uticap.github.io/Youtube-to-M3u8/streams.m3u8</pre>
                  <a href="streams.m3u8" class="btn">▶️ Download Playlist</a>
                  <h3>How to use:</h3>
                  <pre>streamlink --player=vlc https://uticap.github.io/Youtube-to-M3u8/streams.m3u8 best</pre>
                  <p>Or open the playlist directly in VLC (File → Open Network Stream)</p>
              </div>
          </body>
          </html>
          EOF

      - name: Force push with conflict resolution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Backup generated files
          cp streams.m3u8 streams.m3u8.backup 2>/dev/null || true
          cp stats.txt stats.txt.backup 2>/dev/null || true
          
          # Fetch latest and reset to remote (clean slate)
          git fetch origin main
          git reset --hard origin/main || echo "No remote branch yet"
          
          # Restore our files
          mv streams.m3u8.backup streams.m3u8 2>/dev/null || true
          mv stats.txt.backup stats.txt 2>/dev/null || true
          
          git add -f streams.m3u8 stats.txt .nojekyll index.html
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)]"
          
          # Force push (overwrites remote with our version)
          git push --force origin main
          echo "✅ Successfully force pushed"

      - name: Send Telegram notification
        if: success() && github.event_name == 'workflow_dispatch'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📺 *YouTube Playlist Updated*
            
            ✅ Active: ${{ steps.generate.outputs.active }} channels
            
            🔗 https://uticap.github.io/Youtube-to-M3u8/streams.m3u8
