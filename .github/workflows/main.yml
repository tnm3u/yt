name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist with Smart Quality Selection 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Refresh every 6 hours
  push:
    paths:
      - 'streams.txt'
      - 'generate.py'
      - '.github/workflows/main.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # ✅ Map secrets to environment variables for safe conditional checks
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      # ✅ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Setup Python and dependencies
      - name: Setup Python & dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install yt-dlp requests
          echo "✅ yt-dlp version: $(yt-dlp --version)"

      # ✅ Optional: Setup Cloudflare WARP
      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools iptables curl
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          echo "✅ WARP setup complete"

      # ✅ Create cookies file securely (optional)
      - name: Create cookies file securely
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            install -m 600 /dev/null cookies.txt
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"
          else
            echo "⚠️ COOKIES_TXT secret not provided. Continuing without cookies."
          fi

      # ✅ Create necessary directories
      - name: Create necessary directories
        run: |
          mkdir -p logos channels
          touch logos/.gitkeep channels/.gitkeep
          echo "📁 Directories created: logos/, channels/"

      # ✅ Run the playlist generator
      - name: Run enhanced playlist generator
        id: generate
        run: |
          echo "🚀 Starting playlist generation..."
          python3 generate.py
          echo "✅ Generation complete"

      # ✅ Load statistics
      - name: Load stats
        id: stats
        run: |
          if [ -f stats.json ]; then
            ACTIVE=$(python3 -c "import json; print(json.load(open('stats.json')).get('live', 0))")
            TOTAL=$(python3 -c "import json; print(json.load(open('stats.json')).get('total', 0))")
            HD=$(python3 -c "import json; print(json.load(open('stats.json')).get('qualities', {}).get('1080p', 0))")
          else
            ACTIVE=0
            TOTAL=0
            HD=0
          fi
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "quality_1080p=$HD" >> $GITHUB_OUTPUT
          echo "📊 Stats loaded: $ACTIVE/$TOTAL active"

      # ✅ Prepare GitHub Pages configuration
      - name: Prepare for GitHub Pages
        run: |
          touch .nojekyll
          cat > _config.yml << 'EOF'
          include:
            - "*.m3u8"
            - "*.xml"
            - "*.json"
            - "logos/"
            - "channels/"
          mime_types:
            m3u8: application/vnd.apple.mpegurl
            xml: application/xml
            json: application/json
          EOF
          echo "✅ GitHub Pages files created"

      # ✅ Show generated files (for debugging)
      - name: Show generated files
        run: |
          echo "📄 Generated Files:"
          ls -la streams*.m3u8 2>/dev/null || echo "No playlist files"
          ls -la epg.xml 2>/dev/null || echo "No EPG file"
          ls -la stats.json 2>/dev/null || echo "No stats file"
          echo "📁 Channels directory:"
          ls -la channels/ | head -20
          echo "📁 Logos directory:"
          ls -la logos/ | head -10

      # ✅ Commit and push changes
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f streams*.m3u8 epg.xml stats.json .nojekyll _config.yml 2>/dev/null || true
          git add -f logos/ channels/ .channel_cache.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          echo "📦 Files to commit:"
          git diff --cached --name-only | sed 's/^/   - /'

          git commit -m "🔄 Update playlists [$(date -u +'%H:%M UTC')] - ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }} active"

          git pull --rebase origin main || true
          git push origin HEAD:main
          echo "✅ Changes pushed successfully"

      # ✅ Telegram notification on success (only if secrets exist)
      - name: Send Telegram Notification
        if: ${{ success() && github.event_name != 'pull_request' && env.TELEGRAM_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            📺 *YouTube Playlist Updated*

            ✅ *Active:* ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }}
            📊 *1080p:* ${{ steps.stats.outputs.quality_1080p }}

            🌐 *Main Playlist:*
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/streams.m3u8

            📺 *Individual Channels:*
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/channels/

            🕐 *Updated:* $(date -u '+%H:%M UTC')
        continue-on-error: true

      # ✅ Cleanup sensitive files
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f cookies.txt wgcf-profile.conf wgcf-account.toml 2>/dev/null || true
          echo "🧹 Cleaned up sensitive files"

      # ✅ Telegram notification on failure (only if secrets exist)
      - name: Send failure notification
        if: ${{ failure() && env.TELEGRAM_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ❌ *Workflow Failed*

            📦 Repo: ${{ github.repository }}
            🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
